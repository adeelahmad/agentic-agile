  <text class="ts" x="193" y="278" text-anchor="middle" dominant-baseline="central">left out — would replace plan.md</text></g>
  <rect x="378" y="44" width="270" height="248" rx="14" fill="none" stroke="rgba(26,36,51,.16)" stroke-width="0.5"/>
