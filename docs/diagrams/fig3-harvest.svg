</style><title>Harvesting one subsystem of the prior build into two plugin gates</title><desc>The prior build has three layers. Its orchestration layer and plan-DSL/projection layer are left out. Only the code-intelligence layer is harvested, and it backs gate-scaffold-verify and gate-structural-integrity, each with a grep fallback. md-db validates the markdown artifacts separately.</desc>
