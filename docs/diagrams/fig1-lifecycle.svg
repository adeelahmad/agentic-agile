<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 500" role="img"><style>
text.t{fill:#1a2433;font:14px sans-serif}
text.ts{fill:#55606f;font:12px sans-serif}
text.th{fill:#1a2433;font:500 14px sans-serif}
.box{fill:#fffdf8;stroke:rgba(26,36,51,.18)}
.arr{stroke:#1a2433;stroke-width:1.5;fill:none}
.leader{stroke:#8b94a1;stroke-width:.6;stroke-dasharray:3 3;fill:none}
.c-teal rect,rect.c-teal{fill:#e1f5ee;stroke:#0f6e56}.c-teal text{fill:#085041}
.c-gray rect,rect.c-gray{fill:#f1efe8;stroke:#5f5e5a}.c-gray text{fill:#2c2c2a}
.c-blue rect,rect.c-blue{fill:#e6f1fb;stroke:#185fa5}.c-blue text{fill:#0c447c}
.c-coral rect,rect.c-coral{fill:#faece7;stroke:#993c1d}.c-coral text{fill:#712b13}
.c-amber rect,rect.c-amber{fill:#faeeda;stroke:#854f0b}.c-amber text{fill:#633806}
</style><title>agentic-agile plugin lifecycle</title><desc>Planning is interactive and human-gated, producing Stage-1 and Stage-2 artifacts. A Stage-2-complete gate guards the handoff. Execution is autonomous and hook-enforced, running RED, then a post-planner scaffold step, then GREEN, then a final GATE. Halts and escalations feed back to the next planning session.</desc>
  <defs><marker id="ar1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="box" x="40" y="20" width="600" height="140" rx="16" stroke-width="0.5"/>
  <text class="th" x="58" y="42">Planning</text>
  <text class="ts" x="58" y="60">human in the loop · nothing runs yet</text>
  <g class="c-teal"><rect x="60" y="76" width="270" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="195" y="100" text-anchor="middle" dominant-baseline="central">Stage 1 — contract</text>
  <text class="ts" x="195" y="120" text-anchor="middle" dominant-baseline="central">stories.md · sprintN/plan.md</text></g>
  <g class="c-teal"><rect x="360" y="76" width="270" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="495" y="100" text-anchor="middle" dominant-baseline="central">Stage 2 — full plan</text>
  <text class="ts" x="495" y="120" text-anchor="middle" dominant-baseline="central">tasks · validate · plan / story</text></g>
  <line x1="331" y1="108" x2="357" y2="108" class="arr" marker-end="url(#ar1)"/>
  <line x1="340" y1="160" x2="340" y2="183" class="arr" marker-end="url(#ar1)"/>
  <g class="c-amber"><rect x="210" y="185" width="260" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="203" text-anchor="middle" dominant-baseline="central">Stage-2 complete gate</text>
  <text class="ts" x="340" y="221" text-anchor="middle" dominant-baseline="central">refuses handoff until artifacts valid</text></g>
  <line x1="340" y1="235" x2="340" y2="258" class="arr" marker-end="url(#ar1)"/>
  <rect class="box" x="40" y="260" width="600" height="150" rx="16" stroke-width="0.5"/>
  <text class="th" x="58" y="282">Execution</text>
  <text class="ts" x="58" y="300">autonomous · hook-enforced · no human</text>
  <g class="c-gray"><rect x="60" y="320" width="128" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="124" y="344" text-anchor="middle" dominant-baseline="central">RED</text>
  <text class="ts" x="124" y="364" text-anchor="middle" dominant-baseline="central">tests first, all fail</text></g>
  <g class="c-coral"><rect x="204" y="320" width="128" height="64" rx="8" stroke-width="1"/>
  <text class="th" x="268" y="338" text-anchor="middle" dominant-baseline="central">Scaffold</text>
  <text class="ts" x="268" y="356" text-anchor="middle" dominant-baseline="central">post-planner stubs</text>
  <text class="ts" x="268" y="372" text-anchor="middle" dominant-baseline="central">+ SUB-AGENT-TODO</text></g>
  <g class="c-gray"><rect x="348" y="320" width="128" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="412" y="344" text-anchor="middle" dominant-baseline="central">GREEN</text>
  <text class="ts" x="412" y="364" text-anchor="middle" dominant-baseline="central">fill TODO bodies</text></g>
  <g class="c-amber"><rect x="492" y="320" width="128" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="556" y="344" text-anchor="middle" dominant-baseline="central">GATE</text>
  <text class="ts" x="556" y="364" text-anchor="middle" dominant-baseline="central">zero suppressions</text></g>
  <line x1="188" y1="352" x2="202" y2="352" class="arr" marker-end="url(#ar1)"/>
  <line x1="332" y1="352" x2="346" y2="352" class="arr" marker-end="url(#ar1)"/>
  <line x1="476" y1="352" x2="490" y2="352" class="arr" marker-end="url(#ar1)"/>
  <line x1="340" y1="410" x2="340" y2="422" class="arr" marker-end="url(#ar1)"/>
  <rect class="box" x="40" y="424" width="600" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="340" y="441" text-anchor="middle" dominant-baseline="central">↻ halts and collected escalations surface at the next planning session</text>
  <path d="M40 441 L18 441 L18 90 L40 90" fill="none" class="leader" marker-end="url(#ar1)"/>
  <rect class="c-teal" x="60" y="471" width="10" height="10" rx="2"/>
  <text class="ts" x="76" y="476" dominant-baseline="central">planning artifact</text>
  <rect class="c-gray" x="210" y="471" width="10" height="10" rx="2"/>
  <text class="ts" x="226" y="476" dominant-baseline="central">TDD phase</text>
  <rect class="c-coral" x="340" y="471" width="10" height="10" rx="2"/>
  <text class="ts" x="356" y="476" dominant-baseline="central">scaffold (new)</text>
  <rect class="c-amber" x="500" y="471" width="10" height="10" rx="2"/>
  <text class="ts" x="516" y="476" dominant-baseline="central">enforcement gate</text>
  </svg>